# Weekly dependency-update PRs for Maven dependencies and the GitHub Actions
# used in workflows. Grouped so routine bumps arrive as one PR per ecosystem.
version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    groups:
      maven-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
