# Unit tests + coverage gate on every push/PR. The live-API integration test
# (LiveExtractionTest) is disabled automatically unless RUN_INTEGRATION=1 and
# a real ANTHROPIC_API_KEY are set, so no API key is needed here.
name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit tests with coverage gate
        run: mvn -B test

  # The Dockerfile has its own build pipeline (multi-stage Maven build);
  # verify it here so image breakage is caught at PR time, not at deploy.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t afc-sds:ci .
